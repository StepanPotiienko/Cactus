<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Pot -->
  <path d="M65 150 L75 185 L125 185 L135 150 Z" fill="#C67B5C" stroke="#3D2B1F" stroke-width="2"/>
  <rect x="62" y="145" width="76" height="10" rx="3" fill="#A0684A" stroke="#3D2B1F" stroke-width="2"/>
  <!-- Cactus main body -->
  <path d="M95 145 L95 70 Q95 55 100 55 Q105 55 105 70 L105 145 Z" fill="#2D5F3F" stroke="#1E4030" stroke-width="2"/>
  <!-- Left arm -->
  <path d="M95 100 L75 100 Q65 100 65 90 L65 75 Q65 70 70 70 Q75 70 75 75 L75 85 L95 85 Z" fill="#2D5F3F" stroke="#1E4030" stroke-width="2"/>
  <!-- Right arm -->
  <path d="M105 110 L125 110 Q135 110 135 100 L135 80 Q135 75 130 75 Q125 75 125 80 L125 95 L105 95 Z" fill="#2D5F3F" stroke="#1E4030" stroke-width="2"/>
  <!-- Spines (small lines) -->
  <g stroke="#5C8A6F" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="100" y1="65" x2="100" y2="62"/>
    <line x1="97" y1="80" x2="94" y2="80"/>
    <line x1="103" y1="90" x2="106" y2="90"/>
    <line x1="98" y1="105" x2="95" y2="105"/>
    <line x1="102" y1="120" x2="105" y2="120"/>
    <line x1="97" y1="135" x2="94" y2="135"/>
  </g>
  <!-- Smile -->
  <path d="M95 68 Q100 73 105 68" stroke="#5C8A6F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="96" cy="62" r="2" fill="#5C8A6F"/>
  <circle cx="104" cy="62" r="2" fill="#5C8A6F"/>
  <!-- Flower on top -->
  <circle cx="100" cy="50" r="5" fill="#E8A87C" stroke="#C67B5C" stroke-width="1"/>
  <circle cx="100" cy="50" r="2" fill="#F5E6D3"/>
</svg>